<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Panel - Approved Applications</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            padding: 20px;
            background-color: #f4f4f4;
        }
        h2 {
            text-align: center;
        }
        .application-list {
            max-width: 800px;
            margin: 20px auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .application {
            border-bottom: 1px solid #ddd;
            padding: 10px 0;
        }
        .application:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>
    <h2>Approved Applications</h2>
    <div class="application-list" id="applications">
        <p>Loading applications...</p>
    </div>

    <script>
        async function fetchApprovedApplications() {
            const userId = localStorage.getItem("userId"); // Retrieve logged-in user ID

            if (!userId) {
                alert("User not logged in!");
                window.location.href = "/login"; // Redirect if not logged in
                return;
            }

            try {
                const response = await fetch(`/api/user/applications?userId=${userId}`);
                const data = await response.json();

                if (data.success) {
                    const applicationsContainer = document.getElementById("applications");
                    applicationsContainer.innerHTML = ""; // Clear previous content

                    if (data.applications.length === 0) {
                        applicationsContainer.innerHTML = "<p>No approved applications found.</p>";
                        return;
                    }

                    data.applications.forEach(app => {
                        const appDiv = document.createElement("div");
                        appDiv.classList.add("application");
                        appDiv.innerHTML = `
                            <p><strong>Name:</strong> ${app.name}</p>
                            <p><strong>Email:</strong> ${app.email}</p>
                            <p><strong>Status:</strong> ${app.status}</p>
                        `;
                        applicationsContainer.appendChild(appDiv);
                    });
                } else {
                    alert("Error fetching applications!");
                }
            } catch (error) {
                console.error("Error fetching applications:", error);
                alert("Server error!");
            }
        }

        fetchApprovedApplications();
    </script>
</body>
</html>
